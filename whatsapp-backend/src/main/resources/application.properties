# Server Configuration
server.port=8080

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:doctorsfarms686@gmail.com}
spring.mail.password=${EMAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true

# Application Configuration
app.frontend.url=${FRONTEND_URL:http://localhost:5174}
app.backend.url=${BACKEND_URL:http://localhost:8080}
app.contact.email=${CONTACT_EMAIL:doctorsfarms686@gmail.com}
app.admin.emails=${ADMIN_LIST:doctorsfarms686@gmail.com}

# PhonePe Configuration
phonepe.merchant.id=${PHONEPE_MERCHANT_ID:YOUR_MERCHANT_ID}
phonepe.salt.key=${PHONEPE_SALT_KEY:YOUR_SALT_KEY}
phonepe.salt.index=${PHONEPE_SALT_INDEX:1}
phonepe.environment=${PHONEPE_ENV:production}

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/doctorsfarms?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# WhatsApp API Configuration
whatsapp.api.url=https://graph.facebook.com/v18.0
whatsapp.api.token=${WHATSAPP_API_TOKEN:dummy_token}
whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN:dummy_verify_token}
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID:1234567890}

# Security
jwt.secret=${JWT_SECRET}

# Logging
logging.level.com.doctorsfarms=DEBUG