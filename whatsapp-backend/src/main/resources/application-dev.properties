# Development Configuration
server.port=8080

# H2 Database for Development (in-memory)
spring.datasource.url=jdbc:h2:mem:doctorsfarms
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Email Configuration (Development - logs emails instead of sending)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Application Configuration
app.frontend.url=http://localhost:5174
app.backend.url=http://localhost:8080
app.contact.email=doctorsfarms686@gmail.com
app.admin.emails=doctorsfarms686@gmail.com

# Logging
logging.level.com.doctorsfarms=DEBUG
logging.level.org.springframework.mail=DEBUG